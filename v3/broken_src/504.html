<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>504 Gateway Timeout</title>
    <style>
        :root {
            --bg-a: #f8efe7;
            --bg-b: #edd8cb;
            --panel: rgba(255, 252, 248, 0.94);
            --ink: #182132;
            --muted: #5f6877;
            --accent: #c45139;
            --accent-soft: #ffe2d9;
            --line: rgba(24, 33, 50, 0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at 85% 15%, rgba(196, 81, 57, 0.24), transparent 26%),
                radial-gradient(circle at 15% 85%, rgba(111, 51, 62, 0.16), transparent 24%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b));
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            color: var(--ink);
        }
        .panel {
            width: min(860px, 100%);
            padding: 34px;
            border-radius: 30px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.74);
            box-shadow: 0 28px 70px rgba(62, 39, 30, 0.18);
        }
        .chip {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: #8c2f39;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .code {
            margin: 18px 0 8px;
            font-size: clamp(72px, 15vw, 146px);
            line-height: 0.92;
            color: var(--accent);
        }
        h1 { margin: 0 0 12px; font-size: clamp(28px, 4vw, 48px); }
        p {
            margin: 0;
            max-width: 640px;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.8;
        }
        .status-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 24px;
        }
        .status-item {
            padding: 16px;
            border-radius: 18px;
            background: rgba(255,255,255,0.76);
            border: 1px solid var(--line);
        }
        .status-item strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #8c2f39;
            letter-spacing: 0.04em;
        }
        .status-item span { color: var(--muted); font-size: 15px; line-height: 1.7; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 26px; }
        a {
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--ink);
            font-weight: 700;
        }
        a.primary {
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), #e06e4f);
            color: #fff9f4;
        }
    </style>
</head>
<body>
    <main class="panel">
        <div class="chip">TIMEOUT / UPSTREAM ERROR</div>
        <p class="code">504</p>
        <h1>上游响应超时了</h1>
        <p>请求已经到达网关，但依赖服务没能在预期时间内返回结果。这个页面更适合代理层、反向网关或者后端链路超时场景的联调测试。</p>

        <section class="status-board">
            <div class="status-item">
                <strong>CLIENT</strong>
                <span>请求已发送</span>
            </div>
            <div class="status-item">
                <strong>GATEWAY</strong>
                <span>等待上游超时</span>
            </div>
            <div class="status-item">
                <strong>UPSTREAM</strong>
                <span>未及时响应</span>
            </div>
        </section>

        <div class="actions">
            <a class="primary" href="/">返回首页</a>
            <a href="/missing-page">触发 404</a>
        </div>
    </main>
</body>
</html>
