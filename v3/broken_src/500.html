<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Internal Server Error</title>
    <style>
        :root {
            --bg: #f0ece6;
            --panel: rgba(253, 251, 248, 0.93);
            --ink: #172033;
            --muted: #5c6678;
            --accent: #ba4c31;
            --line: rgba(23, 32, 51, 0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(186, 76, 49, 0.24), transparent 26%),
                linear-gradient(135deg, #f9f4ed, #e8dbcf);
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            color: var(--ink);
        }
        .panel {
            width: min(760px, 100%);
            padding: 30px;
            border-radius: 28px;
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.72);
            box-shadow: 0 26px 60px rgba(57, 38, 29, 0.16);
        }
        .code { margin: 0; font-size: clamp(64px, 14vw, 128px); line-height: 1; color: var(--accent); }
        h1 { margin: 10px 0 12px; font-size: clamp(28px, 4vw, 42px); }
        p { margin: 0; color: var(--muted); font-size: 17px; line-height: 1.8; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
        a {
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 14px;
            font-weight: 700;
            background: rgba(255,255,255,0.84);
            border: 1px solid var(--line);
            color: var(--ink);
        }
    </style>
</head>
<body>
    <main class="panel">
        <p class="code">500</p>
        <h1>服务内部出了点问题</h1>
        <p>这个页面先作为统一的内部错误展示模板。后续如果你想接监控编号、请求 ID 或重试建议，这里可以继续扩展。</p>
        <div class="actions">
            <a href="/">返回首页</a>
            <a href="/404.html">查看 404 页面</a>
        </div>
    </main>
</body>
</html>
