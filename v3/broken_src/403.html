<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden</title>
    <style>
        :root {
            --bg-a: #f5ece4;
            --bg-b: #efe0d2;
            --panel: rgba(255, 251, 246, 0.92);
            --ink: #1e2430;
            --muted: #5e6575;
            --accent: #a8472c;
            --line: rgba(30, 36, 48, 0.1);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top right, rgba(168, 71, 44, 0.2), transparent 28%),
                linear-gradient(135deg, var(--bg-a), var(--bg-b));
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            color: var(--ink);
        }
        .panel {
            width: min(760px, 100%);
            padding: 30px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: 0 24px 60px rgba(53, 38, 29, 0.16);
        }
        .code {
            font-size: clamp(58px, 12vw, 120px);
            line-height: 1;
            margin: 0;
            color: var(--accent);
        }
        h1 { margin: 8px 0 10px; font-size: clamp(26px, 4vw, 44px); }
        p { margin: 0; color: var(--muted); line-height: 1.8; font-size: 17px; }
        .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
        a {
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 14px;
            font-weight: 700;
            border: 1px solid var(--line);
            color: var(--ink);
            background: rgba(255,255,255,0.8);
        }
        a.primary { background: var(--accent); color: #fff7f1; border-color: transparent; }
    </style>
</head>
<body>
    <main class="panel">
        <p class="code">403</p>
        <h1>这个页面暂时不对你开放</h1>
        <p>服务已经收到请求，但当前资源没有访问权限。你可以先回到首页继续测试其他页面，后面如果接入权限系统，这一页可以继续沿用。</p>
        <div class="actions">
            <a class="primary" href="/">返回首页</a>
            <a href="/404.html">看 404 页面</a>
        </div>
    </main>
</body>
</html>
